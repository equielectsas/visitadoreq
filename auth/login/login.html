<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>EQUIELECT - Login</title>

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilos -->
    <link href="../../styles/login/css/global.css" rel="stylesheet">
    <link href="../../styles/login/css/login.css" rel="stylesheet">

</head>

<body>

<!-- 🌌 FONDO ANIMADO -->
<div id="particles-js"></div>

<div class="login-wrapper">

    <div class="login-container">

        <!-- IZQUIERDA (SOLO IMAGEN) -->
        <div class="login-left"></div>

        <!-- DERECHA -->
        <div class="login-right">

            <div class="login-card">

                <h4>Iniciar sesión</h4>
                <small>Accede con tus credenciales</small>

                <form id="loginForm">

                    <input type="text" id="cedula" placeholder="Cédula" required>
                    <input type="password" id="password" placeholder="Contraseña" required>

                    <button type="submit" id="loginBtn">Ingresar</button>

                </form>

                <a href="#">¿Olvidaste tu contraseña?</a>

            </div>

        </div>

    </div>

</div>

<!-- Particles -->
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<!-- Config partículas -->
<script>
particlesJS("particles-js", {
  "particles": {
    "number": { "value": 60 },
    "color": { "value": "#ffffff" },
    "shape": { "type": "circle" },
    "opacity": {
      "value": 0.2,
      "random": true
    },
    "size": {
      "value": 3,
      "random": true
    },
    "line_linked": {
      "enable": true,
      "distance": 150,
      "color": "#ffffff",
      "opacity": 0.1,
      "width": 1
    },
    "move": {
      "enable": true,
      "speed": 1.5
    }
  },
  "interactivity": {
    "events": {
      "onhover": { "enable": true, "mode": "grab" }
    }
  }
});
</script>

<!-- LOGIN SCRIPT -->
<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const cedula = document.getElementById("cedula").value;
    const password = document.getElementById("password").value;
    const btn = document.getElementById("loginBtn");

    if (!cedula || !password) {
        alert("Completa los campos");
        return;
    }

    btn.innerText = "Ingresando...";
    btn.disabled = true;

    console.log("Login:", { cedula, password });

    // Aquí conectas tu endpoint real
});
</script>

</body>
</html>
